<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="ippo">
  <rect width="64" height="64" rx="16" fill="#fff6ec"/>
  <!-- やわらかな上向きの一歩（芽が伸びる軌跡） -->
  <path d="M20 46c0-9 5-16 12-19" fill="none" stroke="#e2b79a" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="0.5 8"/>
  <!-- 芽の茎 -->
  <path d="M32 47V30" fill="none" stroke="#c2673f" stroke-width="4" stroke-linecap="round"/>
  <!-- 左の葉 -->
  <path d="M32 33c-4.5-.5-8-3.5-9-8 5-.3 8.8 2.8 9 8z" fill="#c2673f"/>
  <!-- 右の葉 -->
  <path d="M32 28c3-4.4 7.8-5.8 12.5-4.6-1.3 4.8-5.7 7.4-12.5 4.6z" fill="#d57f54"/>
  <!-- 種から芽吹く点（一歩の起点） -->
  <circle cx="32" cy="49" r="3.5" fill="#c2673f"/>
</svg>
