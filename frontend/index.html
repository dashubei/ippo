<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#c2673f" />
    <meta
      name="description"
      content="社交場面の不安に、自分の価値に紐づけた小さな一歩（曝露）を記録して振り返る、非医療のセルフヘルプアプリ ippo。"
    />
    <title>ippo — 価値に紐づく小さな一歩を記録する</title>

    <!-- Open Graph / Twitter（OG スクレイパは JS を実行しないため静的に記載。デプロイ時に og:url を置換すること） -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ippo" />
    <meta property="og:title" content="ippo — 価値に紐づく小さな一歩" />
    <meta
      property="og:description"
      content="社交不安に、価値に紐づけた小さな一歩を記録するセルフヘルプアプリ。"
    />
    <meta property="og:url" content="https://REPLACE_WITH_SITE_ORIGIN/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ippo — 価値に紐づく小さな一歩" />
    <meta
      name="twitter:description"
      content="社交不安に、価値に紐づけた小さな一歩を記録するセルフヘルプアプリ。"
    />
    <!-- フォントは描画をブロックしないよう非同期読込。fallback（丸ゴシック系システムフォント）で
         即時描画し、Web フォントは後から差し替える（FCP/LCP 改善）。JP フォントは重いため
         主フォントの Zen Maru Gothic のみに絞る。 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      />
    </noscript>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "ippo",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "description": "社交場面の不安に、価値に紐づけた小さな一歩（曝露）を記録して振り返る、非医療のセルフヘルプアプリ。"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
